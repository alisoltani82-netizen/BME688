; PlatformIO Project Configuration File
;
; BME688 Environmental Sensor with ESP32-C3 SuperMini
; Round GC9A01 240x240 RGB Display (SPI)

[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; Enable USB CDC on boot for ESP32-C3
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Libraries
lib_deps = 
    https://github.com/boschsensortec/Bosch-BSEC2-Library.git
    https://github.com/boschsensortec/Bosch-BME68x-Library.git
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit GC9A01A@^1.0.2

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
extra_scripts = 
    pre:copy_bsec_config.py
    pre:patch_bsec_warning.py
